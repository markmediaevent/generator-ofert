<!DOCTYPE html><html lang="pl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Logowanie — baza sprzętu</title><style>body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(180deg,#040a13,#0b1629);color:#eef4ff;font-family:Inter,Arial,sans-serif}.card{width:min(460px,92vw);padding:28px;border-radius:24px;border:1px solid rgba(255,255,255,.1);background:linear-gradient(180deg, rgba(18,30,52,.95), rgba(10,19,35,.95));box-shadow:0 20px 60px rgba(0,0,0,.35)}h1{margin:0 0 8px;font-size:34px;letter-spacing:-.04em}p{margin:0 0 18px;color:#9bb0d4;line-height:1.7}.field{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}.field label{color:#9bb0d4;font-size:13px;font-weight:800}.field input{padding:14px 15px;border-radius:14px;border:1px solid rgba(255,255,255,.1);background:rgba(5,13,25,.72);color:#fff}.btn{width:100%;padding:14px 16px;border:none;border-radius:14px;background:linear-gradient(135deg,#1d4ed8,#4ea1ff);color:#fff;font-weight:800;cursor:pointer}.muted{margin-top:14px;font-size:12px;color:#9bb0d4}.error{margin-top:12px;color:#ff8ea1;font-weight:700}a{color:#95d7ff}</style></head><body><div class="card"><h1>Logowanie</h1><p>Panel bazy sprzętu jest dostępny po zalogowaniu.</p><form id="loginForm"><div class="field"><label>Login</label><input id="username" value="admin"></div><div class="field"><label>Hasło</label><input id="password" type="password" value="markmedia123"></div><button class="btn" type="submit">Zaloguj</button><div class="error" id="error"></div></form><div class="muted">Domyślnie: <strong>admin / markmedia123</strong></div><div class="muted"><a href="/">← Wróć do strony głównej</a></div></div><script>document.getElementById('loginForm').addEventListener('submit', async (e) => {e.preventDefault();const error=document.getElementById('error');error.textContent='';const username=document.getElementById('username').value;const password=document.getElementById('password').value;const res=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});const data=await res.json();if(!res.ok||!data.ok){error.textContent=data.message||'Błąd logowania';return;}localStorage.setItem('admin_token',data.token);location.href='/admin';});</script></body></html>
